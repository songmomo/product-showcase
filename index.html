<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>内购商品展示</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 页面标题区域 -->
  <header class="page-header">
    <div class="container">
      <h1>内购商品展示</h1>
    </div>
  </header>

  <!-- 主内容区域 -->
  <main class="container">
    <!-- 商品卡片网格 -->
    <div id="product-grid" class="product-grid"></div>

    <!-- 暂无商品提示（默认隐藏） -->
    <div id="empty-state" class="empty-state hidden">暂无商品</div>

    <!-- 加载失败提示（默认隐藏） -->
    <div id="error-state" class="empty-state hidden">加载失败，请刷新页面</div>

    <!-- 购买模态框 -->
    <div id="purchase-modal" class="modal-overlay hidden">
      <div class="modal-box">
        <div class="modal-header">
          <h3>购买商品</h3>
          <button class="modal-close" onclick="closePurchaseModal()">&times;</button>
        </div>
        <div class="modal-body">
          <div class="modal-product-name" id="modal-product-name"></div>
          <input type="hidden" id="purchase-product-id">
          <div class="form-group">
            <label>购买数量</label>
            <input type="number" id="purchase-quantity" value="1" min="1">
          </div>
          <div class="form-group">
            <label>购买人姓名<span class="required">*</span></label>
            <input type="text" id="purchase-buyer" placeholder="请填写您的姓名">
            <span class="field-error" id="buyer-error"></span>
          </div>
          <div id="purchase-error" class="message message-error"></div>
          <div id="purchase-message" class="message message-success"></div>
        </div>
        <div class="modal-footer">
          <button id="purchase-submit-btn" class="btn btn-primary" onclick="submitPurchase()">确认购买</button>
        </div>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script>
    // 仅在非 DEMO 模式下加载 Supabase CDN
    if (!CONFIG.DEMO_MODE) {
      document.write('<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"><\/script>');
    }
  </script>
  <script src="js/supabase.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
