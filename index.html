<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>内购商品展示</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 页面标题区域 -->
  <header class="page-header">
    <div class="container">
      <h1>内购商品展示</h1>
    </div>
  </header>

  <!-- 主内容区域 -->
  <main class="container">
    <!-- 商品卡片网格 -->
    <div id="product-grid" class="product-grid"></div>

    <!-- 暂无商品提示（默认隐藏） -->
    <div id="empty-state" class="empty-state hidden">暂无商品</div>

    <!-- 加载失败提示（默认隐藏） -->
    <div id="error-state" class="empty-state hidden">加载失败，请刷新页面</div>
  </main>

  <script src="js/config.js"></script>
  <script>
    // 仅在非 DEMO 模式下加载 Supabase CDN
    if (!CONFIG.DEMO_MODE) {
      document.write('<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"><\/script>');
    }
  </script>
  <script src="js/supabase.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
